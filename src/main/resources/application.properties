# Conexão com MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/guardias
spring.datasource.username=root
spring.datasource.password=senai12345
# Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Corrige serializacao do LocalDate \u2014 retorna "2026-05-09" em vez de [2026,5,9]
spring.jackson.serialization.write-dates-as-timestamps=false

# Thymeleaf \u2014 desativa cache para sempre buscar dados frescos
spring.thymeleaf.cache=false

